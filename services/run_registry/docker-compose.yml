services:
  run-registry:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      RUN_REGISTRY_HOST: 0.0.0.0
      RUN_REGISTRY_PORT: 8080
      RUN_REGISTRY_DB_HOST: postgres
      RUN_REGISTRY_DB_PORT: 5432
      RUN_REGISTRY_DB_NAME: run_registry
      RUN_REGISTRY_DB_USER: run_registry
      RUN_REGISTRY_DB_PASSWORD: run_registry
      RUN_REGISTRY_AUTH_TOKEN: change-me
      RUN_REGISTRY_CORS_ORIGINS: http://localhost:3000
      RUN_REGISTRY_RETENTION_DAYS: 30
      RUN_REGISTRY_LIVENESS_TTL_SECONDS: 60
      RUN_REGISTRY_LIVENESS_GRACE_PERIOD_SECONDS: 120
    depends_on:
      postgres:
        condition: service_healthy

  run-registry-ui:
    build:
      context: ../run_registry_ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      run-registry:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: run_registry
      POSTGRES_USER: run_registry
      POSTGRES_PASSWORD: run_registry
    ports:
      - "5432:5432"
    volumes:
      - run-registry-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U run_registry -d run_registry"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  run-registry-db:
