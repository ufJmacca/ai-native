name: Sync Release PR Lockfile

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled

permissions:
  contents: write
  pull-requests: read

jobs:
  sync-uv-lock:
    if: >
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'autorelease: pending')
    runs-on: ubuntu-latest
    steps:
      - name: Check out release PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7.1.5

      - name: Regenerate root uv.lock
        run: uv lock

      - name: Commit updated lockfile
        run: |
          if git diff --quiet -- uv.lock; then
            echo "uv.lock is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: sync uv.lock for release"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
