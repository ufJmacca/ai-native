workspace:
  artifacts_dir: artifacts
  specs_dir: specs
  base_branch: main
  question_budget_per_stage: 3
  question_budget_per_run: 9
  plan_max_attempts: 6
  architecture_max_attempts: 6
  prd_max_attempts: 10
  loop_max_attempts: 15
  verification_max_attempts: 10
  mermaid_validate_command:
    - mmdc
  mermaid_validate_args:
    - --quiet

agents:
  builder:
    type: codex-exec
    model: gpt-5.4
    sandbox: workspace-write
    extra_args:
      - --full-auto
      - -c
      - model_reasoning_effort="xhigh"
  critic:
    type: codex-exec
    model: gpt-5.4
    sandbox: workspace-write
    extra_args:
      - --full-auto
      - -c
      - model_reasoning_effort="xhigh"
  verifier:
    type: codex-exec
    model: gpt-5.4
    sandbox: workspace-write
    extra_args:
      - --full-auto
      - -c
      - model_reasoning_effort="xhigh"
  pr_reviewer:
    type: codex-review
    model: gpt-5.4
    base_branch: main
    extra_args:
      - -c
      - model_reasoning_effort="xhigh"

git:
  branch_prefix: codex
  conventional_prefix: feat
  pr_draft: true

quality_gates:
  require_plan_approval: true
  require_diagram_approval: true
  require_prd_approval: true
  require_test_critique: true
  require_red_green_refactor: true
